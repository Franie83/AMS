{% extends "layout.html" %}
{% block body %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card">
            <div class="card-header bg-primary text-white">
                <h4 class="mb-0">✏️ Edit User: {{ user.name }}</h4>
            </div>
            <div class="card-body">
                <form method="POST">
                    <div class="mb-3">
                        <label class="form-label">Full Name <span class="text-danger">*</span></label>
                        <input type="text" class="form-control" name="name" value="{{ user.name }}" required>
                    </div>
                    
                    <div class="mb-3">
                        <label class="form-label">Email <span class="text-danger">*</span></label>
                        <input type="email" class="form-control" name="email" value="{{ user.email }}" required>
                    </div>
                    
                    <div class="mb-3">
                        <label class="form-label">Phone Number <span class="text-danger">*</span></label>
                        <input type="text" class="form-control" name="phone" value="{{ user.phone or '' }}" required>
                    </div>
                    
                    <div class="mb-3">
                        <label class="form-label">MDA <span class="text-danger">*</span></label>
                        <input type="text" class="form-control" name="mda" value="{{ user.mda or '' }}" required>
                    </div>
                    
                    <div class="mb-3">
                        <label class="form-label">Role <span class="text-danger">*</span></label>
                        <select class="form-select" name="role" required>
                            <option value="user" {% if user.role == 'user' %}selected{% endif %}>User</option>
                            <option value="admin" {% if user.role == 'admin' %}selected{% endif %}>Admin</option>
                            <option value="mda_user" {% if user.role == 'mda_user' %}selected{% endif %}>MDA User</option>
                            <option value="superadmin" {% if user.role == 'superadmin' %}selected{% endif %}>Super Admin</option>
                        </select>
                    </div>
                    
                    <div class="mb-4">  <!-- Changed from mb-3 to mb-4 for more space -->
                        <label class="form-label">New Password (leave blank to keep current)</label>
                        <input type="password" class="form-control" name="password">
                        <small class="text-muted d-block mt-2">Enter only if you want to change the password</small>
                        <!-- Added d-block mt-2 for proper spacing -->
                    </div>
                    
                    <hr class="mt-4 mb-4">  <!-- Added more margin top and bottom -->
                    
                    <div class="d-flex gap-2 mt-3">  <!-- Added mt-3 for top margin -->
                        <button type="submit" class="btn btn-primary">💾 Save Changes</button>
                        <a href="{{ url_for('admin_users') }}" class="btn btn-secondary">Cancel</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

<!-- Add bottom padding to the container -->
<style>
.row.justify-content-center {
    margin-bottom: 50px;
    padding-bottom: 30px;
}
/* Ensure proper spacing in the form */
.mb-4 {
    margin-bottom: 1.5rem !important;
}
.mt-4 {
    margin-top: 1.5rem !important;
}
.mt-3 {
    margin-top: 1rem !important;
}
.mt-2 {
    margin-top: 0.5rem !important;
}
.d-block {
    display: block !important;
}
</style>
{% endblock %}
